<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afdal IT Solution</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

/* MENU */
nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:15px;
}

nav a:hover{
    color:#38bdf8;
}

/* HERO */
.hero{
    text-align:center;
    margin-top:120px;
}

.hero h1{
    font-size:50px;
}

/* GRADIENT TEXT */
.gradient{
    background:linear-gradient(90deg,#38bdf8,#a855f7,#f43f5e);
    -webkit-background-clip:text;
    color:transparent;
}

/* TYPING */
#typing{
    font-size:22px;
    margin-top:15px;
}

/* FLOATING PLANETS */
.planet{
    position:absolute;
    font-size:28px;
    animation:orbit linear infinite;
}

@keyframes orbit{
    from{
        transform:rotate(0deg) translateX(250px) rotate(0deg);
    }
    to{
        transform:rotate(360deg) translateX(250px) rotate(-360deg);
    }
}

.planet1{ top:40%; left:50%; animation-duration:20s;}
.planet2{ top:40%; left:50%; animation-duration:30s;}
.planet3{ top:40%; left:50%; animation-duration:40s;}
.planet4{ top:40%; left:50%; animation-duration:50s;}

</style>
</head>

<body>

<header>
<div class="logo">Afdal IT Solution</div>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>
</nav>
</header>


<div class="hero">

<h1>Hello, I'm <span class="gradient">Afdal</span></h1>

<div id="typing"></div>

</div>


<!-- FLOATING TOOLS -->
<div class="planet planet1">💻</div>
<div class="planet planet2">🧠</div>
<div class="planet planet3">⚙️</div>
<div class="planet planet4">🖥️</div>


<script>

const text = [
"Web Developer",
"AI Explorer",
"Graphic Designer",
"IT Solutions Builder"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function type(){

currentText = text[i];

if(!isDeleting){
document.getElementById("typing").innerHTML =
currentText.substring(0,j++);
}else{
document.getElementById("typing").innerHTML =
currentText.substring(0,j--);
}

if(!isDeleting && j === currentText.length){
isDeleting = true;
setTimeout(type,1000);
return;
}

if(isDeleting && j === 0){
isDeleting = false;
i++;
if(i === text.length){
i = 0;
}
}

setTimeout(type,isDeleting?50:100);
}

type();

</script>

</body>
</html>
