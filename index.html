<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afdal IT Solution</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND GALAXY */

/* BACKGROUND GALAXY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow-x:hidden;

/* DARK GALAXY BACKGROUND */

background:
radial-gradient(circle at 20% 30%, rgba(30,58,138,0.35) 0%, transparent 55%),
radial-gradient(circle at 80% 70%, rgba(124,58,237,0.30) 0%, transparent 55%),
radial-gradient(circle at 50% 50%, rgba(14,165,233,0.20) 0%, transparent 60%),
#020617;

background-attachment: fixed;
min-height:100vh;
}

/* DARK GALAXY BACKGROUND */

background:
radial-gradient(circle at 20% 30%, rgba(30,58,138,0.4) 0%, transparent 50%),
radial-gradient(circle at 80% 70%, rgba(124,58,237,0.35) 0%, transparent 50%),
radial-gradient(circle at 50% 50%, rgba(14,165,233,0.25) 0%, transparent 60%),
#020617;

background-attachment: fixed;
min-height:100vh;
}
}


/* STARS */

.stars{
background:transparent;
width:1px;
height:1px;
position:fixed;
width:100%;
height:100%;
background:transparent;

box-shadow:
100px 200px white,
300px 400px white,
500px 100px white,
700px 600px white,
900px 300px white,
1200px 200px white,
1500px 500px white,
1700px 100px white,
200px 600px white,
600px 300px white,
900px 500px white;

animation:twinkle 5s infinite alternate;
z-index:-1;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}


/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
position:fixed;
width:100%;
top:0;
backdrop-filter:blur(10px);
background:rgba(2,6,23,0.5);
}


/* LOGO */

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#38bdf8,#a855f7,#f43f5e);
background-size:300%;
-webkit-background-clip:text;
color:transparent;

animation:gradientMove 6s infinite linear;
}


/* MENU */

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:15px;
transition:0.3s;
}

nav a:hover{
color:#38bdf8;
}


/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero h1{
font-size:60px;
font-weight:700;
}


/* GRADIENT TEXT */

.gradient{
background:linear-gradient(90deg,#38bdf8,#a855f7,#f43f5e);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:300%}
}


/* TYPING */

#typing{
font-size:34px;
margin-top:20px;
font-weight:500;
opacity:0.9;
}


/* FLOATING PLANETS */

.planet{
position:absolute;
font-size:30px;
animation:orbit linear infinite;
}

@keyframes orbit{
from{
transform:rotate(0deg) translateX(260px) rotate(0deg);
}
to{
transform:rotate(360deg) translateX(260px) rotate(-360deg);
}
}

.planet1{ top:45%; left:50%; animation-duration:20s;}
.planet2{ top:45%; left:50%; animation-duration:28s;}
.planet3{ top:45%; left:50%; animation-duration:35s;}
.planet4{ top:45%; left:50%; animation-duration:45s;}


/* BUTTON */

.btn{
margin-top:35px;
display:inline-block;
padding:12px 28px;
border-radius:30px;

background:linear-gradient(90deg,#38bdf8,#a855f7);
color:white;
text-decoration:none;
font-weight:bold;

transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #38bdf8;
}

</style>
</head>

<body>

<div class="stars"></div>

<header>

<div class="logo">Afdal IT Solution</div>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>
</nav>

</header>


<div class="hero">

<h1>Hello, I'm <span class="gradient">Afdal</span></h1>

<div id="typing"></div>

<a class="btn" href="#">View Portfolio</a>

</div>


<!-- FLOATING TOOLS -->

<div class="planet planet1">💻</div>
<div class="planet planet2">🧠</div>
<div class="planet planet3">⚙️</div>
<div class="planet planet4">🖥️</div>



<script>

const text = [
"IT Solutions Builder",
"Web Developer",
"AI Explorer",
"Creative Designer"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function type(){

currentText = text[i];

if(!isDeleting){
document.getElementById("typing").innerHTML =
currentText.substring(0,j++);
}else{
document.getElementById("typing").innerHTML =
currentText.substring(0,j--);
}

if(!isDeleting && j === currentText.length){
isDeleting = true;
setTimeout(type,1200);
return;
}

if(isDeleting && j === 0){
isDeleting = false;
i++;
if(i === text.length){
i = 0;
}
}

setTimeout(type,isDeleting?80:140);
}

type();

</script>

</body>
</html>
